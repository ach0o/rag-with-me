llm:
  provider: azure-openai
  model: gpt-5-mini
  temperature: 1
  max_tokens: 1024
  
embedder:
  provider: azure-openai
  model: text-embedding-3-small

vector_store:
  provider: chromadb
  collection_name: rag-97things
  path: ./data/chroma_vector_db

chunker:
  strategy: semantic
  threshold: 0.5
  min_chunk_size: 100

retriever:
  provider: hybrid
  top_k: 5

reranker:
  provider: cross_encoder
  top_k: 3

data_source:
  path: ./data/97-things
  type: markdown

database:
  url: "postgresql://rag:localdev@localhost:5432/rag_agent"
  enabled: true
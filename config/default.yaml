llm:
  provider: azure-openai
  model: gpt-5-mini
  temperature: 1
  max_tokens: 1024
  
embedder:
  provider: azure-openai
  model: text-embedding-3-small

vector_store:
  provider: chromadb
  collection_name: rag-97things
  path: ./data/chroma_vector_db

chunker:
  strategy: fixed-size
  chunk_size: 500
  chunk_overlap: 50

retriever:
  provider: dense
  top_k: 5

reranker:
  provider: none
  top_k: 3

data_source:
  path: ./data/97-things
  type: markdown

